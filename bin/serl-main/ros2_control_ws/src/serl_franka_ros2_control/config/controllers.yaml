/**:
  controller_manager:
    ros__parameters:
      serl_safe_cartesian_pose_controller:
        type: serl_franka_ros2_control/SafeCartesianPoseController
      serl_safe_cartesian_velocity_controller:
        type: serl_franka_ros2_control/SafeCartesianVelocityController

/**:
  serl_safe_cartesian_pose_controller:
    ros__parameters:
      arm_id: "fr3"
      target_topic: "~/target_pose"
      use_state_interfaces: true
      startup_hold_time_s: 1.0
      watchdog_timeout_sec: 0.25
      max_translation_step_m: 0.00002
      max_translation_speed_mps: 0.006
      max_translation_acceleration_mps2: 0.020
      max_translation_jerk_mps3: 0.100
      translation_tracking_time_s: 0.20
      max_rotation_step_rad: 0.01
      max_target_distance_m: 0.004
      activation_hold_tolerance_m: 0.0001
      first_target_tolerance_m: 0.0001
      command_measured_tracking_tolerance_m: 0.0005
      debug_publish_period_s: 0.10
  serl_safe_cartesian_velocity_controller:
    ros__parameters:
      target_topic: "~/target_twist"
      frame_id: "fr3_link0"
      startup_hold_time_s: 1.0
      watchdog_timeout_sec: 0.25
      max_linear_speed_mps: 0.004
      max_linear_acceleration_mps2: 0.003
      max_angular_speed_radps: 0.0
      max_angular_acceleration_radps2: 0.0
